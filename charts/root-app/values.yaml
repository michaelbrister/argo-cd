name: root-app
namespace: argo-cd

project: default

source:
  repoURL: git@github.com:michaelbrister/argo-cd.git
  targetRevision: HEAD
  path: apps

destination:
  server: https://kubernetes.default.svc
  namespace: argo-cd

syncPolicy:
  automated: true
  prune: true
  selfHeal: true
  createNamespace: true
