apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: workloads-git-generator
  namespace: argo-cd
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: git@github.com:michaelbrister/argo-cd.git
        revision: HEAD
        directories:
          - path: platform/workloads/*/*
  template:
    metadata:
      name: '{{ index .path.segments 2 }}-{{ index .path.segments 3 }}'
    spec:
      project: workloads
      source:
        repoURL: git@github.com:michaelbrister/argo-cd.git
        targetRevision: HEAD
        path: '{{ .path.path }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: 'workloads-{{ index .path.segments 2 }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
